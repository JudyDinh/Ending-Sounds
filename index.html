<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --grey-bg: #e8e4df;
    --grey-active: #b5ada4;
    --pink-bg: #f2c4c4;
    --pink-active: #e07b7b;
    --page-bg: #faf8f5;
    --text: #2a2420;
    --subtext: #7a6f68;
    --accent: #4a7c8c;
    --btn: #2a2420;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--page-bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    gap: 32px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    color: var(--text);
    letter-spacing: -0.5px;
    text-align: center;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--subtext);
    text-align: center;
    margin-top: 6px;
  }



  .sentence-token {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .sentence-token.grey-token { color: #6b6059; }
  .sentence-token.pink-token { color: #c0474e; }

  @keyframes popIn {
    0% { transform: scale(0.7) translateY(8px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .grid-section {
    width: 100%;
    max-width: 760px;
  }

  .section-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--subtext);
    margin-bottom: 10px;
  }

  .pill-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 9px;
    margin-bottom: 20px;
  }

  .pill {
    padding: 9px 16px;
    border-radius: var(--radius);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: default;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
    user-select: none;
    border: 1.5px solid transparent;
    line-height: 1.3;
    text-align: center;
  }

  .pill.grey {
    background: var(--grey-bg);
    color: var(--text);
    border-color: #d5cfc9;
  }

  .pill.pink {
    background: var(--pink-bg);
    color: #6b2020;
    border-color: #e8aaaa;
  }

  .pill.highlighted-grey {
    background: var(--grey-active);
    color: white;
    border-color: #9e958d;
    transform: scale(1.06) translateY(-2px);
    box-shadow: 0 6px 18px rgba(120,100,88,0.28);
  }

  .pill.highlighted-pink {
    background: var(--pink-active);
    color: white;
    border-color: #c45a5a;
    transform: scale(1.06) translateY(-2px);
    box-shadow: 0 6px 18px rgba(200,80,80,0.28);
  }

  .pill.fade-out {
    opacity: 0.38;
  }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .roll-btn {
    background: var(--btn);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 44px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: transform 0.12s ease, background 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }

  .roll-btn:hover {
    background: #3d3530;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.22);
  }

  .roll-btn:active {
    transform: translateY(0px) scale(0.97);
  }

  .roll-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .hint {
    font-size: 0.78rem;
    color: var(--subtext);
  }

  .adverb-badge {
    background: #ddf0f5;
    color: var(--accent);
    border-radius: 8px;
    padding: 5px 13px;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

</style>
</head>
<body>

<div>
  <h1>Sentence <span>Builder</span></h1>
  <p class="subtitle">Click the button to randomly combine a subject + verb phrase</p>
</div>



<div class="grid-section">
  <div class="section-label">Subjects</div>
  <div class="pill-grid" id="greyGrid"></div>

  <div class="section-label">Verb Phrases</div>
  <div class="pill-grid" id="pinkGrid"></div>
</div>

<div class="controls">
  <button class="roll-btn" id="rollBtn" onclick="roll()">🎲 Roll</button>
  <span class="hint">Row 2 subjects appear more often</span>
</div>

<script>
  const greyRow1 = ["I", "You", "We", "They", "These people", "The clients"];
  const greyRow2 = ["He", "She", "This junior staff", "My colleague", "My boss"];

  const pinkWords = [
    "provide an update", "give feedback", "deliver a presentation", "raise a concern", "address an issue",
    "explain the process", "present findings", "liaise with clients", "manage multiple tasks", "schedule meetings",
    "meet deadlines", "follow up on tasks", "achieve targets", "optimise processes", "analyse data",
    "identify issues", "make informed decisions", "lead a project", "implement changes", "execute a strategy"
  ];

  let allGrey = [...greyRow1, ...greyRow2];
  let rolling = false;

  function buildGrids() {
    const greyGrid = document.getElementById('greyGrid');
    const pinkGrid = document.getElementById('pinkGrid');

    allGrey.forEach(word => {
      const pill = document.createElement('div');
      pill.className = 'pill grey';
      pill.textContent = word;
      pill.id = 'grey-' + word.replace(/\s+/g, '-');
      greyGrid.appendChild(pill);
    });

    pinkWords.forEach(word => {
      const pill = document.createElement('div');
      pill.className = 'pill pink';
      pill.textContent = word;
      pill.id = 'pink-' + word.replace(/\s+/g, '-');
      pinkGrid.appendChild(pill);
    });
  }

  function weightedGreyPick() {
    // Row 2 has 3x higher weight
    const pool = [
      ...greyRow1,
      ...greyRow2, ...greyRow2, ...greyRow2
    ];
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function clearHighlights() {
    document.querySelectorAll('.pill').forEach(p => {
      p.className = p.className.replace(/\s*(highlighted-grey|highlighted-pink|fade-out)/g, '');
    });
  }

  async function roll() {
    if (rolling) return;
    rolling = true;
    document.getElementById('rollBtn').disabled = true;

    clearHighlights();
    document.getElementById('sentenceDisplay').innerHTML = '<span class="placeholder">Rolling…</span>';

    const chosenGrey = weightedGreyPick();
    const chosenPink = pinkWords[Math.floor(Math.random() * pinkWords.length)];

    // Rapid flash effect
    let flashes = 0;
    const maxFlashes = 10;

    await new Promise(resolve => {
      const interval = setInterval(() => {
        clearHighlights();
        // Random flash during roll
        const rg = allGrey[Math.floor(Math.random() * allGrey.length)];
        const rp = pinkWords[Math.floor(Math.random() * pinkWords.length)];

        const gPill = document.getElementById('grey-' + rg.replace(/\s+/g, '-'));
        const pPill = document.getElementById('pink-' + rp.replace(/\s+/g, '-'));
        if (gPill) gPill.classList.add('highlighted-grey');
        if (pPill) pPill.classList.add('highlighted-pink');

        flashes++;
        if (flashes >= maxFlashes) {
          clearInterval(interval);
          resolve();
        }
      }, 80);
    });

    // Final highlight
    clearHighlights();

    allGrey.forEach(w => {
      const el = document.getElementById('grey-' + w.replace(/\s+/g, '-'));
      if (el) el.classList.add(w === chosenGrey ? 'highlighted-grey' : 'fade-out');
    });

    pinkWords.forEach(w => {
      const el = document.getElementById('pink-' + w.replace(/\s+/g, '-'));
      if (el) el.classList.add(w === chosenPink ? 'highlighted-pink' : 'fade-out');
    });

    // Display sentence
    const display = document.getElementById('sentenceDisplay');
    display.innerHTML = `
      <span class="sentence-token grey-token">${chosenGrey}</span>
      <span class="sentence-token" style="color:#aaa;font-weight:400">usually</span>
      <span class="sentence-token pink-token">${chosenPink}</span>
    `;

    rolling = false;
    document.getElementById('rollBtn').disabled = false;
  }

  buildGrids();
</script>
</body>
</html>
